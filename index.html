<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Restaurar ruta guardada por 404.html (GitHub Pages SPA fallback)
      (function() {
        var redirect = sessionStorage.getItem('redirect');
        if (redirect) {
          sessionStorage.removeItem('redirect');
          window.history.replaceState(null, null, redirect);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nokia-Platform" />
    <meta name="theme-color" content="#144E4A" />
    <link rel="icon" type="image/svg+xml" href="/Nokia-Project-Platform/favicon.svg" />
    <link rel="apple-touch-icon" href="/Nokia-Project-Platform/apple-touch-icon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <title>Liquidador Nokia 2026</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
