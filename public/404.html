<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Nokia Project Platform</title>
  <script>
    // SPA fallback para GitHub Pages:
    // Guarda la URL completa en sessionStorage y redirige al index.
    // El index restaura la ruta antes de que React monte.
    sessionStorage.setItem('redirect', window.location.pathname + window.location.search + window.location.hash);
    window.location.replace('/Nokia-Project-Platform/');
  </script>
</head>
</html>
