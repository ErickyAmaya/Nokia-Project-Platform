name: Database Backup

on:
  schedule:
    - cron: '0 3 1 * *'   # 1 de cada mes a las 3am UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo del backup'
        required: false
        default: 'Backup manual desde la app'

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar cliente PostgreSQL
        run: sudo apt-get install -y postgresql-client

      - name: Generar backup
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="backup_${TIMESTAMP}.sql.gz"
          pg_dump "$DATABASE_URL" --schema=public | gzip > "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          echo "Backup generado: $FILENAME"

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
