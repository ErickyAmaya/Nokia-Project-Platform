name: Database Backup

on:
  schedule:
    - cron: '0 3 1 * *'   # 1 de cada mes a las 3am UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo del backup'
        required: false
        default: 'Backup manual desde la app'

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar cliente PostgreSQL 17
        run: |
          sudo apt-get install -y gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Generar backup
        env:
          DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="backup_${TIMESTAMP}.sql.gz"
          PGPASSWORD="$DB_PASSWORD" pg_dump \
            --host="$DB_HOST" \
            --port=5432 \
            --username="postgres.tvlskyihhxfnxfgifilk" \
            --dbname=postgres \
            --schema=public \
            | gzip > "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          echo "Backup generado: $FILENAME"

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
